version: '3.8'

services:
  api:
    build: ./backend
    command: python main.py api
    volumes:
      - ./backend:/app
    restart: unless-stopped
    env_file: .env

  bot:
    build: ./backend
    command: python main.py bot
    depends_on:
      - api
    volumes:
      - ./backend:/app
    restart: unless-stopped
    env_file: .env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - default
      - traefik-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web-app.rule=Host(`canteen.thompson.uz`)"
      - "traefik.http.routers.web-app.entrypoints=websecure"
      - "traefik.http.routers.web-app.tls.certresolver=le"
      - "traefik.http.services.web-app.loadbalancer.server.port=80"

networks:
  default:
  traefik-net:
    external: true
    name: web
